# Feature-engineering configuration
feature_groups:
  price_based: true
  valuation_based: true
  quality_profitability: true
  growth: true
  balance_sheet: true
  revisions: false
  market_cap: true

lookbacks:
  momentum_3m: 3
  momentum_6m: 6
  momentum_12m: 12
  volatility_12m: 12
  beta_12m: 12
  drawdown_12m: 12

lags:
  default_periods: 1
  fundamentals_periods: 1

missingness:
  numeric_fill: "none"
  categorical_fill: "missing"
  drop_threshold: 0.5

benchmarks:
  beta_benchmark: "SPY"
